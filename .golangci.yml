run:
  timeout: 5m

linters:
  disable-all: false
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell

linters-settings:
  goimports:
    local-prefixes: telegram-ogn-tracker

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
