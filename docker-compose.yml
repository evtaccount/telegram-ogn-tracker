version: '3.8'
services:
  ogn-tracker:
    image: telegram-ogn-tracker:latest
    build:
      context: .
      args:
        APP_VERSION: ${APP_VERSION:-dev}
    container_name: ogn-tracker
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - DEBUG=${DEBUG:-}
      - ALLOWED_CHATS=${ALLOWED_CHATS:-}
      - LOG_FILE=${LOG_FILE:-}
    volumes:
      - ./data:/root/data
      - ./logs:/root/logs
    restart: always
